<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="/CSSFIles/StudentRegistration.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>  
    <header>
        <div class="d-flex align-items-center p-3" >
            <img src="/Images/logo.png" alt="Logo" class="img-fluid" style="width: 100px; height: auto;">
            <h1 class="display-1">CVR College Of Engineering</h1>
        </div>
        <nav class="navbar navbar-expand-lg navbar-light bg-secondary">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="Home">
                            <a class="nav-link active" aria-current="page" href="/Webpages/homepage.html">Home</a>
                        </li>
                        <li class="About">
                            <a class="nav-link" href="/Webpages/About.html">About</a>
                        </li>
                        <li class="Courses">
                            <div class="dropdown dropdown-center">
                                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                    Courses
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">CSE</a></li>
                                    <li><a class="dropdown-item" href="#">IT</a></li>
                                    <li><a class="dropdown-item" href="#">EEE</a></li>
                                </ul>
                            </div>
                        </li>
                        <li class="Contact">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                        <li>
                            <a class="nav-link" href="/Webpages/login.html">Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <div class="container-fluid mt-5" style="">
        <h2 class="text-center mb-4">Student Registration</h2>
        <form>
            <div class="mb-3 ">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>
            <div class="mb-3">
                <label for="rno" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="rno" placeholder="Enter your roll number">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>
            <div class="mb-3">
                <label for="mobilenumber" class="form-label">Mobile Number</label>
                <input type="text" class="form-control" id="mobilenumber" placeholder="Enter your mobile number" minlength="10" maxlength="10" pattern="\d{10}" title="Please enter exactly 10 digits">
            </div>
            <div class="mb-3">
                <label for="gender" class="form-label">Gender</label>
                <select class="form-control" id="gender">
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="course" class="form-label">Course</label>
                <select class="form-control form-select " id="course">
                    <option value="">Select Course</option>
                    <option value="pp">Python Programming</option>
                    <option value="jp">Java Programming</option>
                    <option value="ccd">Cloud Computing and Devops</option>
                    <option value="ds">DataScience</option>
                    <option value="dbms">MySql</option>

                </select>
            </div>
            
            <div class="mb-3">
                <label for="qualification" class="form-label">Qualification</label>
                <select class="form-control form-select " id="course">
                    <option value="ug">Under Graduate</option>
                    <option value="pg">Post Graduate</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="Address" class="form-label">Address</label>
                <textarea class="form-control form-text-area" placeholder="Enter your address"></textarea>
            </div>
            <div class="mb-3">
                <label for="Photo" class="form-label">Upload Resume</label>
                <input type="file" class="form-control" id="Photo">
            </div>
            <div class="mb-3 form-check d-flex justify-content-center">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">I agree to the terms and conditions</label>
            </div>
            <div class="container-fluid">
                <figure class="text-center " ><button type="submit" class="btn btn-dark btn-lg">Register</button></figure>
            </div>
        </form>
     </div>   
    <footer>

        <p>
            © 2026 CVR College of Engineering. All Rights Reserved.
        </p>

        <p>
            <a href="#" class="text-white me-3">Facebook</a>
            <a href="#" class="text-white me-3">Instagram</a>
            <a href="#" class="text-white">LinkedIn</a>
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
